name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen   # ヘッドレスで PySide6 を動かす
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Qt runtime libraries (for offscreen PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyflakes pytest

      - name: Syntax / undefined-name check (logic modules)
        run: |
          python -m pyflakes $(git ls-files '*.py' | grep -vE '^(graph_onefile|tools/)') 2>&1 \
            | grep "undefined name '" | grep -v "may be undefined" && exit 1 || echo "no undefined names"

      - name: Run tests (offscreen)
        run: python -m pytest tests/ -v
